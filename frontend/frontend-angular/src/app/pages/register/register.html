<!--Este contendor div con la clase auth-wrapper es el contendor padre-->
<div class="auth-wrapper">
  <!--Contenedor hijo tiene la clase auth-contaner para dar estilos en css contiene los titulos
  del formulario y el mismo formulario-->
  <div class="auth-container">
    <!--Titulo-->
    <h2>Crear una cuenta</h2>
    <!--Mnesaje de ayuda al usuario-->
    <p>Regístrate para empezar a gestionar tus productos.</p>
<!--Si errorMessage que es nuestra varible signal tiene algo es decir hay un error mostrara ese mensaje de error -->
    @if (errorMessage()) {
      <div class="alert-error">⚠️ {{ errorMessage() }}</div>
    }
<!--con [formGroup]="registerForm" le decimos al formualrio que pertnece al objeto registerForm que definimos en typescript posteriormente al hacer click en crear mi cuenta hara lo siguiente (ngSubmit)="onSubmit()" manadara llamar al metodo onsubmit que creara el nuevo registro en la base de datos-->
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <!--Vamos a envolver la pareja de label e input en dentro de un contenedor div para
      dar estilos con la ayuda de la clase form-group-->
      <div class="form-group">
        
        <label>Nombre completo</label>
        <!--A nuestro input lo vinculamos con formControlName="name" donde a este input le damos el nombre de name vinculando esta propiedad con la propiedad name que definimos en nuestro objeto registerForm-->
        <input type="text" formControlName="name" placeholder="Ej. Juan Pérez">
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <!--Vinculamos este input de tipo email con la propiedad email que definimos en nuestro objeto registerForm tambien llamada email-->
        <input type="email" formControlName="email" placeholder="correo@ejemplo.com">
      </div>

      <div class="form-group">
        <label>Contraseña (mínimo 8 caracteres)</label>
        <!--Vinculamos este input con la propiedad password del objeto registerForm-->
        <input type="password" formControlName="password" placeholder="********">
      </div>

      <div class="form-group">
        <label>Confirmar contraseña</label>
        <!--Le damos el nombre de paasword-confirmation a este input para vincularlo con el objeto registerForm-->
        <input type="password" formControlName="password_confirmation" placeholder="********">
      </div>

      <div class="form-group">
        <label>Foto de perfil (Opcional)</label>
        <!--Este input es de tipo file osea para subir un archivo en este caso una imagen, una parte inportante es que este input tiene un evento change es decir sirve para cuando un usuario termina de elegir un archivo de su computadora se dispara en este caso dispara la funcion onFileSelected que captura en su parametro el archivo o imagen que acaba de subir,
        accept=image/* quiere decir que al abrir el explorador de archivos solo aceptara imaganes de cualquier tipo con ayuda de /* -->
        <input 
          type="file" 
          (change)="onFileSelected($event)" 
          accept="image/*"
          class="input-file"
        >
        <!-- Agreagamos nuestra etiqueta small para indicarle los formatos permitidos al usuario-->
        <small>Formatos permitidos: JPG, PNG, AVIF. Máximo 2MB.</small>
      </div>
<!--Nuestro boton de tipo submit que si algun campo esta como invalid es boton estara desabilitado y tiene la clase btn-register para dar estilos en css-->
      <button type="submit" [disabled]="registerForm.invalid" class="btn-register">
        Crear mi cuenta
      </button>
    </form>
<!--Ya fuera de nuestro formulario agregaremos un parafo que contenga un link que diga inicia sesion aqui en caso de que el usuario ya cuente con una contraseña y nos lleve al formulario de iniciar sesion-->
    <p class="footer-text">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
    </p>
  </div>
</div>
